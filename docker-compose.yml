services:
  usgs-mcp:
    build: .
    container_name: usgs-publications-mcp
    ports:
      - "8000:8000"
    environment:
      # Transport: streamable-http exposes POST /mcp
      - MCP_TRANSPORT=streamable-http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
      - MCP_DISABLE_DNS_REBINDING_PROTECTION=true
      # Stateless HTTP mode: avoid session lookup/session-not-found 404 behavior
      - FASTMCP_STATELESS_HTTP=true
      # Security configuration (override defaults as needed)
      - USGS_MCP_RATE_LIMIT_REQUESTS_PER_MINUTE=60
      - USGS_MCP_RATE_LIMIT_REQUESTS_PER_HOUR=1000
      - USGS_MCP_MAX_PAGE_SIZE=100
      - USGS_MCP_AUDIT_LOGGING_ENABLED=true
    restart: unless-stopped
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Security options
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
