apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: usgs-mcp-network-policy
  namespace: mcp-servers
spec:
  podSelector:
    matchLabels:
      app: usgs-publications-mcp
  policyTypes:
    - Ingress
    - Egress
  
  ingress:
    # Allow traffic from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
    
    # Allow traffic from same namespace (for health checks, etc.)
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8000
  
  egress:
    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    
    # Allow HTTPS to USGS API
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
