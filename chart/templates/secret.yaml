{{- if .Values.auth.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "usgs-pub-wh-mcp.authSecretName" . }}
  labels:
    {{- include "usgs-pub-wh-mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  USGS_MCP_API_KEY: {{ required "auth.apiKey is required when auth.create=true" .Values.auth.apiKey | quote }}
  USGS_MCP_BEARER_TOKEN: {{ required "auth.bearerToken is required when auth.create=true" .Values.auth.bearerToken | quote }}
{{- end }}
