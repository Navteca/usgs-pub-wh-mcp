{{- if .Values.tests.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "usgs-pub-wh-mcp.fullname" . }}-test-connection"
  labels:
    {{- include "usgs-pub-wh-mcp.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox:1.36
      command:
        - sh
        - -c
        - wget -qO- http://{{ include "usgs-pub-wh-mcp.fullname" . }}:{{ .Values.service.port }}/health
  restartPolicy: Never
{{- end }}
