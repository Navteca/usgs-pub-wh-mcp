{{- if .Values.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "usgs-pub-wh-mcp.fullname" . }}
  labels:
    {{- include "usgs-pub-wh-mcp.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "usgs-pub-wh-mcp.selectorLabels" . | nindent 6 }}
{{- end }}
