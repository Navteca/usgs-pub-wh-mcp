{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "usgs-pub-wh-mcp.fullname" . }}
  labels:
    {{- include "usgs-pub-wh-mcp.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "usgs-pub-wh-mcp.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- range .Values.networkPolicy.ingress.allowedNamespaces }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . }}
      ports:
        - protocol: TCP
          port: {{ $.Values.container.port }}
    {{- end }}
    {{- if .Values.networkPolicy.ingress.allowSameNamespace }}
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.container.port }}
    {{- end }}
  egress:
    {{- if .Values.networkPolicy.egress.dns }}
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- end }}
    {{- if .Values.networkPolicy.egress.https.enabled }}
    - to:
        {{- range .Values.networkPolicy.egress.https.cidrs }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
      ports:
        - protocol: TCP
          port: 443
    {{- end }}
{{- end }}
